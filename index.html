<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculadora Factorio</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="data:,">
</head>

<body>
	<div class="container">
		<header>
			<h1>Calculadora de Producción Factorio</h1>
			<p>¡La fábrica debe crecer!</p>
		</header>
		<main>
			<section class="calculator">
				<div class="input-group">
					<label for="tier-select" class="main-label">Tier de tecnología:</label>
					<div class="input-group">
						<label class="main-label">Selecciona un item:</label>

						<!-- Tabs de categorías -->
						<div class="category-tabs">
							<button class="tab-btn active" data-category="all">Todos</button>
							<button class="tab-btn" data-category="logistics">Logística</button>
							<button class="tab-btn" data-category="production">Producción</button>
							<button class="tab-btn" data-category="resources">Recursos</button>
							<button class="tab-btn" data-category="space">Espacio</button>
							<button class="tab-btn" data-category="combat">Combate</button>
						</div>

						<!-- Búsqueda -->
						<input type="text" id="item-search" placeholder="Buscar item..." class="search-input">

						<!-- Grid de items -->
						<div id="item-grid" class="item-grid">
							<!-- Los items se generan con JS -->
						</div>

						<!-- Item seleccionado (oculto pero funcional) -->
						<input type="hidden" id="item-select">
						<div id="selected-item-display" class="selected-item-display">
							Ningún item seleccionado
						</div>
					</div>
				</div>
				<div class="input-group">
					<label for="item-select" class="main-label">Selecciona un item:</label>
					<div class="select-wrapper">
						<select id="item-select">
							<!-- Las opciones se llenan con JS -->
						</select>
					</div>
				</div>
				<div class="input-group">
					<label for="rate-input">Cantidad por minuto:</label>
					<input type="number" id="rate-input" min="0" step="0.1" value="60">
				</div>
				<button id="calculate-btn" class="btn-primary">Calcular Producción</button>
			</section>
			<section class="machine-upgrades">
				<h2>️ Configuración de Máquinas (Upgrades)</h2>
				<p class="upgrade-note">Cambia el Tier arriba para actualizar los valores por defecto, o selecciona manualmente
					qué máquina usar para cada proceso.</p>
				<div id="machine-upgrades-content"></div>
			</section>
			<section id="results" class="results hidden">
				<h2>Resultados</h2>
				<div id="results-content"></div>
			</section>
		</main>
	</div>
	<script src="script.js"></script>
</body>

</html>
