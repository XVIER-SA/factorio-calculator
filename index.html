<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Factorio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>🏭 Calculadora de Producción Factorio</h1>
      <p>¡La fábrica debe crecer!</p>
    </header>
    <main>
      <section class="calculator">
        <div class="input-group">
          <label for="item-select">Selecciona un item:</label>
          <select id="item-select">
            <option value="">Cargando...</option>
          </select>
        </div>
        <div class="input-group">
          <label for="rate-input">Cantidad por minuto:</label>
          <input type="number" id="rate-input" min="0" step="0.1" value="60">
        </div>
        <button id="calculate-btn" class="btn-primary">Calcular</button>
      </section>
      <section id="results" class="results hidden">
        <h2>Resultados</h2>
        <div id="results-content"></div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>

</html>
